version: "3.9"

services:

  mysql:
    image: mysql:8
    container_name: mysql-remedios
    environment:
      MYSQL_ROOT_PASSWORD: 2808
      MYSQL_DATABASE: remedio_api
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  api:
    build: .
    container_name: api-remedios
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"